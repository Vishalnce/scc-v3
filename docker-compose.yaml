version: "2.0"
services:
  postgres-service:
    image: postgres
    container_name: postgresdb
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
  
  ssc-website:
    image: vishalnce/ssc-website:latest
    container_name: ssc-website-app
    depends_on:
      - postgres-service
    ports:
      - "3000:3000"
    env_file:
      - .env

volumes:
  pgdata: